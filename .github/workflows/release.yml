name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - run: GOOS=windows GOARCH=amd64 go build -o mnet-auto-x64.exe .
      - run: GOOS=linux GOARCH=amd64 go build -o mnet-auto-x64.bin .
      - run: GOOS=darwin GOARCH=amd64 go build -o mnet-auto-macos-x64 .

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            mnet-auto-x64.exe
            mnet-auto-x64.bin
            mnet-auto-macos-x64
